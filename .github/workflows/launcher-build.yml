name: Build launcher

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run check
          npm run format:check
          npm audit

      - name: Build Windows installer
        run: npm run release:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload EML bootstrap files
        uses: actions/upload-artifact@v4
        with:
          name: fefe-du-973-launcher-windows
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
